<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modal Vessel OS v4.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="terminal">
        <div class="screen">
            <h1>MODAL VESSEL OS v4.0</h1>
            <p class="boot-text">Boot Sequence Initiated...</p>
            <p class="boot-text">Loading Kernel...</p>
            <p class="boot-text">Checking Memory...</p>
            <p class="boot-text">Verifying User...</p>
            
            <div class="login-choice">
                <p>How do you wanna join?</p>
                <button id="guest-btn">GUEST</button>
                <button id="admin-btn">ADMIN</button>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
